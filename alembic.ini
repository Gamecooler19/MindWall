# Alembic configuration file.
# This file is read by `alembic` commands.
# The sqlalchemy.url is overridden at runtime by alembic/env.py using app settings.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder — the real URL is injected in env.py from app.config.Settings.
sqlalchemy.url = postgresql+asyncpg://mindwall:mindwall@localhost:5432/mindwall

[post_write_hooks]
# Uncomment to auto-format generated migration files:
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
