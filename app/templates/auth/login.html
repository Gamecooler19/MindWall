{% extends "base.html" %}

{% block title %}Sign In — Mindwall{% endblock %}

{% block content %}

<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="mb-8 text-center">
      <svg class="w-10 h-10 text-red-500 mx-auto mb-3" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
      <h1 class="text-2xl font-bold text-white">Mindwall</h1>
      <p class="mt-1 text-sm text-gray-400">Sign in to your account</p>
    </div>

    <!-- Error message -->
    {% if error %}
    <div class="mb-5 rounded-md bg-red-950 border border-red-800 p-4" role="alert">
      <p class="text-sm text-red-300">{{ error }}</p>
    </div>
    {% endif %}

    <!-- Login form — standard HTML form, works without JavaScript -->
    <form method="post" action="/login" novalidate class="space-y-5">

      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1.5">
          Email address
        </label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          required
          value="{{ prefill_email | default('') }}"
          class="block w-full rounded-md bg-gray-900 border border-gray-700 text-white px-3 py-2 text-sm
                 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent"
          placeholder="you@example.com"
          aria-describedby="email-hint"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-300 mb-1.5">
          Password
        </label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          class="block w-full rounded-md bg-gray-900 border border-gray-700 text-white px-3 py-2 text-sm
                 placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-red-600 focus:border-transparent"
          placeholder="••••••••"
        />
      </div>

      <button
        type="submit"
        class="w-full flex justify-center items-center py-2.5 px-4 rounded-md text-sm font-medium
               text-white bg-red-600 hover:bg-red-700 transition-colors
               focus:outline-none focus:ring-2 focus:ring-red-600 focus:ring-offset-2 focus:ring-offset-gray-950"
      >
        Sign in
      </button>

    </form>

    <p class="mt-6 text-center text-xs text-gray-700">
      All authentication is handled locally. No credentials are transmitted to external services.
    </p>

  </div>
</div>

{% endblock %}
