{% extends "base.html" %}

{% block title %}Page Not Found — Mindwall{% endblock %}

{% block content %}

<div class="flex flex-col items-center justify-center py-24 text-center">
  <p class="text-6xl font-bold text-gray-800 mb-4">404</p>
  <h1 class="text-xl font-semibold text-white mb-2">Page not found</h1>
  <p class="text-sm text-gray-400 mb-8 max-w-sm">
    The page you requested does not exist or has been moved.
  </p>
  <a href="/"
     class="inline-flex items-center gap-2 px-4 py-2 bg-gray-800 hover:bg-gray-700 text-white text-sm rounded-lg transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to dashboard
  </a>
</div>

{% endblock %}
